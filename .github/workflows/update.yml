name: Daily Market Update

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 8AM EST Mon-Fri (12 UTC)
  workflow_dispatch:          # allows manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build dashboard
        env:
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: python build.py

      - name: Deploy
        run: |
          git config user.name "SIGNAL Bot"
          git config user.email "signal@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily market update $(date +'%Y-%m-%d')"
          git push
